{% extends 'base.html' %}
{% block title %}SecureCloud | Share File{% endblock %}
{% block content %}
<section class="form-wrap glass">
    <h2>Share {{ file.original_name }}</h2>
    <form method="post" class="stack">
        {% csrf_token %}
        <label>Viewer Username</label>
        {{ form.username }}
        <label>Permission</label>
        {{ form.permission }}
        <label class="inline-check">{{ form.remove_access }} Remove this viewer's access</label>
        <button class="btn" type="submit">Update Sharing</button>
    </form>
</section>
{% endblock %}
