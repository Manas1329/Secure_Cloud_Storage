{% extends 'base.html' %}
{% block title %}SecureCloud | Register{% endblock %}
{% block content %}
<section class="form-wrap glass">
    <h2>Create Account</h2>
    <p>Only User and Viewer registrations are allowed here.</p>
    <form method="post" class="stack">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            <small class="error">{{ field.errors|striptags }}</small>
        {% endfor %}
        <button class="btn" type="submit">Register</button>
    </form>
</section>
{% endblock %}
